<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group 10 | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Group 10</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-intro">
      <p class="eyebrow">Contact</p>
      <h1>Get in touch with our group.</h1>
      <p>
        Use the details below to contact the team about the project.
      </p>
    </section>

    <section class="contact-layout">
      <div class="content-panel">
        <h2>Contact Details</h2>
        <p><strong>Email:</strong> pandora.group@example.com</p>
        <p><strong>Course:</strong> Cloud Computing</p>
        <p><strong>Location:</strong> Group Work Workspace</p>
        <img class="panel-image" src="assets/contact-illustration.svg" alt="Illustration of an envelope and message bubbles">
      </div>

      <form class="contact-form" action="#" method="post">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="your@email.com">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message"></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Group 10. All rights reserved.</p>
  </footer>
</body>
</html>
